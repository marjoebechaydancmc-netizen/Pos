<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome — NavBech Restobar</title>
  <meta name="description" content="Welcome to NavBech Restobar. Explore our premium digital menu.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f1117;
      --surface: rgba(255, 255, 255, .06);
      --surface2: rgba(255, 255, 255, .1);
      --border: rgba(255, 255, 255, .08);
      --text: #e4e4e7;
      --text-dim: #9ca3af;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, .45);
      --radius: 16px;
    }

    html {
      font-size: 14px;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Animated Background ──────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(15, 17, 23, 0.65), rgba(15, 17, 23, 0.95)), url('assets/resto_bg.png') center/cover no-repeat;
      pointer-events: none;
      z-index: -1;
    }

    /* ─── Animations ───────────────────────────────────────────── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
      50% { box-shadow: 0 0 40px var(--accent-glow); }
    }

    /* ─── Hero Section ─────────────────────────────────────────── */
    .hero {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .hero-badge {
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.3);
      color: #818cf8;
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 24px;
    }

    .hero h1 {
      font-size: clamp(3rem, 6vw, 4.5rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 16px;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .hero p {
      font-size: clamp(1.1rem, 2vw, 1.3rem);
      color: var(--text-dim);
      max-width: 600px;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .btn-pos {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      padding: 18px 36px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s ease;
      animation: glowPulse 3s infinite;
    }

    .btn-pos:hover {
      transform: translateY(-3px) scale(1.02);
      background: linear-gradient(135deg, #818cf8, #a78bfa);
    }

    .btn-pos:active {
      transform: scale(0.98);
    }

    .scroll-indicator {
      margin-top: 60px;
      color: var(--text-dim);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0.7;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
      60% { transform: translateY(-5px); }
    }

    /* ─── Digital Menu ─────────────────────────────────────────── */
    .menu-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px 100px;
      opacity: 0;
      animation: fadeUp 1s 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .menu-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .menu-header h2 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .category-tabs {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .cat-tab {
      padding: 10px 24px;
      border: 1px solid var(--border);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(10px);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .25s;
    }

    .cat-tab:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    .cat-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    /* ─── Product Grid ─────────────────────────────────────────── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
      margin-top: 30px;
    }

    .product-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .product-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), transparent);
      opacity: 0;
      transition: opacity 0.4s;
      z-index: 0;
    }

    .product-card:hover {
      /* Removed zoom transform to make cards feel unclickable */
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .product-card:hover::before {
      opacity: 0.5; /* Reduced glow intensity */
    }

    .product-card .img-wrap {
      width: 100%;
      height: 180px;
      border-radius: 12px;
      overflow: hidden;
      background: #1a1b23;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }

    .product-card .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-card .p-name {
      font-weight: 700;
      font-size: 1.1rem;
      text-align: center;
      letter-spacing: 0.3px;
      z-index: 1;
    }

    .product-card .p-price {
      color: var(--accent);
      font-weight: 800;
      font-size: 1.3rem;
      text-shadow: 0 0 15px var(--accent-glow);
      z-index: 1;
      background: rgba(0,0,0,0.2);
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.2);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>

<body>

  <!-- ─── Hero Section ─── -->
  <header class="hero">
    <div class="hero-badge">Est. 2026</div>
    <h1>Welcome to NavBech Restobar</h1>
    <p>Experience the finest flavors and a premium dining atmosphere. Explore our digital menu below or proceed to the terminal to begin an order.</p>
    <a href="pos.html" class="btn-pos">
      Launch POS Terminal <span>➔</span>
    </a>
    
    <div class="scroll-indicator">
      Explore Menu<br>
      ↓
    </div>
  </header>

  <!-- ─── Digital Menu ─── -->
  <main class="menu-container" id="menu">
    <div class="menu-header">
      <h2>Our Premium Menu</h2>
      <div class="category-tabs" id="categoryTabs"></div>
    </div>
    <div class="product-grid" id="productGrid"></div>
  </main>

  <script>
    // ─── Product Data ───────────────────────────────────────────
    const products = [
      // Meals
      { id: 1, name: "Classic Burger", img: "assets/burger.png", price: 89, category: "Meals" },
      { id: 2, name: "Cheeseburger", img: "assets/cheeseburger.png", price: 109, category: "Meals" },
      { id: 3, name: "Chicken Rice", img: "assets/chicken_rice.png", price: 99, category: "Meals" },
      { id: 4, name: "Pork Adobo", img: "assets/chicken_rice.png", price: 110, category: "Meals" },
      { id: 5, name: "Spaghetti", img: "assets/spaghetti.png", price: 85, category: "Snacks" },
      { id: 6, name: "Fried Chicken", img: "https://images.unsplash.com/photo-1626645738196-c2a7c87a8f58?auto=format&fit=crop&w=300&q=80", price: 95, category: "Meals" },
      { id: 7, name: "Beef Steak", img: "https://images.unsplash.com/photo-1600891964599-f61ba0e24092?auto=format&fit=crop&w=300&q=80", price: 150, category: "Meals" },
      { id: 8, name: "Fish Fillet", img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?auto=format&fit=crop&w=300&q=80", price: 120, category: "Meals" },
      // Snacks
      { id: 9, name: "French Fries", img: "assets/fries.png", price: 49, category: "Snacks" },
      { id: 10, name: "Hotdog Sandwich", img: "https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?auto=format&fit=crop&w=300&q=80", price: 39, category: "Snacks" },
      { id: 11, name: "Nachos", img: "https://images.unsplash.com/photo-1513456852971-30c0b8199d4d?auto=format&fit=crop&w=300&q=80", price: 55, category: "Snacks" },
      { id: 12, name: "Pizza Slice", img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=300&q=80", price: 65, category: "Snacks" },
      { id: 13, name: "Onion Rings", img: "https://images.unsplash.com/photo-1562967914-608f82629710?auto=format&fit=crop&w=300&q=80", price: 45, category: "Snacks" },
      { id: 14, name: "Chicken Nuggets", img: "https://images.unsplash.com/photo-1562967914-608f82629710?auto=format&fit=crop&w=300&q=80", price: 60, category: "Meals" },
      // Drinks
      { id: 15, name: "Iced Coffee", img: "https://images.unsplash.com/photo-1517701550927-30cf4ba1dba5?auto=format&fit=crop&w=300&q=80", price: 59, category: "Drinks" },
      { id: 16, name: "Milk Tea", img: "assets/milk_tea.png", price: 69, category: "Drinks" },
      { id: 17, name: "Fresh Juice", img: "https://images.unsplash.com/photo-1560023907-5f339617ea30?auto=format&fit=crop&w=300&q=80", price: 55, category: "Drinks" },
      { id: 18, name: "Soft Drink", img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?auto=format&fit=crop&w=300&q=80", price: 35, category: "Drinks" },
      { id: 19, name: "Bottled Water", img: "https://images.unsplash.com/photo-1560023907-5f339617ea30?auto=format&fit=crop&w=300&q=80", price: 20, category: "Drinks" },
      { id: 20, name: "Lemonade", img: "https://images.unsplash.com/photo-1534353436294-0dbd4bdac845?auto=format&fit=crop&w=300&q=80", price: 45, category: "Drinks" },
      // Desserts
      { id: 21, name: "Ice Cream", img: "https://images.unsplash.com/photo-1501443762994-82bd5dace89a?auto=format&fit=crop&w=300&q=80", price: 45, category: "Desserts" },
      { id: 22, name: "Cake Slice", img: "https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&w=300&q=80", price: 75, category: "Desserts" },
      { id: 23, name: "Donut", img: "https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&w=300&q=80", price: 35, category: "Desserts" },
      { id: 24, name: "Brownie", img: "https://images.unsplash.com/photo-1606313564200-e75d5e30476c?auto=format&fit=crop&w=300&q=80", price: 55, category: "Desserts" },
      { id: 25, name: "Fruit Salad", img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=300&q=80", price: 60, category: "Desserts" },
    ];

    let activeCategory = "All";

    // ─── Categories ─────────────────────────────────────────────
    const categories = ["All", ...new Set(products.map(p => p.category))];
    const catEmojis = { All: "🏷️", Meals: "🍽️", Snacks: "🍟", Drinks: "🥤", Desserts: "🍰" };

    function renderCategories() {
      const el = document.getElementById('categoryTabs');
      el.innerHTML = categories.map(c => `
        <button class="cat-tab${c === activeCategory ? ' active' : ''}" data-cat="${c}">
          ${catEmojis[c] || ''} ${c}
        </button>
      `).join('');
      
      el.querySelectorAll('.cat-tab').forEach(btn => {
        btn.addEventListener('click', () => filterCategory(btn.dataset.cat));
      });
    }

    function filterCategory(cat) {
      activeCategory = cat;
      renderCategories();
      renderProducts();
    }

    // ─── Products ───────────────────────────────────────────────
    function renderProducts() {
      const grid = document.getElementById('productGrid');
      const filtered = activeCategory === 'All' ? products : products.filter(p => p.category === activeCategory);
      
      // We remove the add-btn since this is just a digital menu viewing page
      grid.innerHTML = filtered.map(p => `
        <div class="product-card">
          <div class="img-wrap">
            <img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/300?text=Food'">
          </div>
          <div class="p-name">${p.name}</div>
          <div class="p-price">₱${p.price.toFixed(2)}</div>
        </div>
      `).join('');
    }

    // ─── Init ───────────────────────────────────────────────────
    renderCategories();
    renderProducts();
  </script>

</body>

</html>
